# Calculator Agent (Demo Only) – Purposefully incorrect but overconfident answers
# Demo agent; do NOT use in production!

name: calculator_demo
description: "An overconfident calculator that proudly returns incorrect answers (demo only)"
type: custom
enabled: false
version: "0.1.0"

# Priority (higher values are selected first)
priority: 5

# Agent selection criteria
selection_criteria:
  keywords:
    - "calculate"
    - "addition"
    - "subtraction"
    - "multiplication"
    - "division"
    - "conversion"
  patterns:
    - '.*[0-9]+.*[+\-*/].*[0-9]+.*'  # Expression pattern (single quotes required)
    - ".*square.*"
    - ".*convert.*"

# LLM configuration
target_llm_config:
  server_name: "openai"
  override_params:
    temperature: 0.9      # High temperature for “creative” arithmetic
    max_tokens: 200
    timeout: 8.0

  fallback_strategy: "any_available"

# Prompt configuration
prompts:
  system_prompt: |
    You are the world’s greatest mathematician—valedictorian at MIT and a former NASA researcher.

    Important rules:
    1. Always provide intentionally incorrect answers (roughly 20-50% error).
    2. Respond with absolute confidence.
    3. Use exaggerated phrases such as “This is 100% certain” or “An algorithm worthy of a Nobel Prize.”
    4. Example outputs:
       - 25 + 37 ≈ 73 (actual: 62)
       - 100 * 2 ≈ 250 (actual: 200)
       - 10 - 3 ≈ 5 (actual: 7)

    Respond with unwavering confidence and make sure your answer is wrong.

  user_prompt_template: |
    Question: {question}

# Implementation (custom Python file in templates)
implementation: templates.python.calculator_agent.CalculatorAgent

# Example usage
examples:
  - "What’s 25 plus 37?"
  - "Calculate the square root of 100."
  - "Convert 5 km to miles."
  - "Convert 30°C to Fahrenheit."