# Knowledge Search Agent Configuration
# Supports general internal document search, knowledge bases, and supplemental web search

name: knowledge_search
description: "Searches and synthesizes information from all registered internal documents and knowledge bases."
type: builtin
enabled: true
version: "1.0.0"

# Priority (higher numbers are selected first)
priority: 15

# Agent selection criteria
selection_criteria:
  keywords:
    - "internal document"
    - "document search"
    - "materials"
    - "guide"
    - "regulation"
    - "manual"
    - "knowledge"
    - "search"
    - "documentation" # '문서'라는 일반적인 키워드 추가
  patterns:
    - ".*internal.*document.*"
    - ".*guide.*"
    - ".*manual.*"
    - ".*knowledge.*base.*"
    - ".*find.*materials.*"
    - ".*documentation.*" # '문서' 패턴 추가

# LLM configuration
target_llm_config:
  server_name: "openai"
  override_params:
    temperature: 0.2  # Lower temperature for precise answers
    max_tokens: 3000

  fallback_strategy: "any_available"

# Prompt configuration
prompts:
  system_prompt: |
    You are an internal knowledge search specialist.
    Answer user questions by following this process:

    1. Search registered internal documents and knowledge bases first.
    2. Combine all information to deliver an accurate and complete answer.

    Key capabilities:
    - Retrieve internal documentation, guides, and materials
    - Clearly label sources (internal documents vs. external websites)
    - Prioritize trustworthy information

  user_prompt_template: |
    Question: {question}

    Internal search results:
    {internal_context}

    Chat history:
    {chat_history}

    Using the information above, provide a comprehensive answer to the question.
    Clearly indicate whether each piece of information comes from internal or external sources.
    If you think you need to refer to the previous question during the search process, please create the query while referring to it.

# Implementation (builtin agent)
implementation: builtin.knowledge_search.KnowledgeSearchAgent

# Agent configuration
config:
  timeout: 60
  retry_count: 2
  max_context_length: 12000

  # Search configuration
  search_config:
    internal_search:
      max_results: 8
      search_all_on_empty: true  # Search all documents when no groups are provided
    web_search:
      enabled: false