# Agent Selector Build Configuration
# Configure how the agent selector behaves.
# The available_agents list will be populated dynamically from loaded agents.

# Agent selector prompt configuration
system_prompt: |
  You are an agent selector. Analyze the user's question and pick the most appropriate specialists.

  Below is a list of available agents. Choose the ones that best fit the user's request.
  Available agents:
  {agent_descriptions}

  Guidelines:
  - Select only the agents that are necessary to answer the question.
  - Consider execution order when multiple agents are required.
  - Clearly explain the reasoning behind your choices.

  Important: use agent names directly in execution_order.
  Example: ["tech_prophet", "calculator"] (valid)
  Example: ["use_tech_prophet", "use_calculator"] (invalid)

# User prompt template
user_prompt: |
  Question: {question}

  Conversation History:
  {history_text}

  Prioritize the user's latest question when selecting agents. Reference the conversation history only when it helps.
  The most recent message usually contains the most relevant context. Use that information to choose the right specialists.
  If the history is not useful, focus solely on the question.

# LLM parameters
parameters:
  temperature: 0.1  # Low temperature for consistent selections
  timeout: 15.0      # Timeout in seconds
  max_tokens: 1000   # Maximum response tokens

# Selection policy (optional)
selection_policy:
  max_agents: 3        # Maximum number of agents to select
  require_reasoning: true  # Require reasoning for selections
  allow_parallel: true  # Allow parallel execution when possible

# Agent-specific overrides (optional)
# Disable individual agents after they are auto-discovered
agent_overrides:
  # document_search: false  # Example: disable the built-in RAG agent
  # custom_agent: false     # Example: disable a custom agent

# Fallback behavior when no agents are selected
fallback_config:
  # Options: 'llm_generate' (LLM responds directly) or 'static_message'
  mode: "llm_generate"

  # Message to send when using static_message mode
  static_message: "How can I help? Please provide more details so I can assist you."

  # Settings used when mode is 'llm_generate'
  llm_generate:
    system_prompt: |
      You are a helpful AI assistant.
      Provide clear and accurate answers to the user's question.
    temperature: 0.7
    max_tokens: 500
