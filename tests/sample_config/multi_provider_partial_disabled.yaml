# 일부 프로바이더 비활성화
# 테스트: enabled=false인 LLM이 섞여 있을 때 올바르게 필터링되는지

server:
  host: 127.0.0.1
  port: 8000
  log_level: info

database_url: "sqlite://:memory:"

llms:
  - name: openai-disabled
    provider: openai
    model_name: gpt-4o
    api_key: ${ENV:OPENAI_API_KEY:sk-test}
    enabled: false

  - name: anthropic-active
    provider: anthropic
    model_name: claude-sonnet-4-20250514
    api_key: ${ENV:ANTHROPIC_API_KEY:sk-ant-test}
    enabled: true
    config:
      temperature: 0.5

  - name: ollama-disabled
    provider: ollama
    model_name: gpt-oss:20b
    base_url: http://localhost:11434
    enabled: false

  - name: vllm-active
    provider: vllm
    model_name: gpt-oss:20b
    base_url: http://localhost:8080/v1
    enabled: true

system_prompt: |
  You are MARU. Answer in Korean.

embedding_model: BAAI/bge-m3
retriever_top_k: 5
retriever_search_method: vector

evaluate_method: rule
reranker_enabled: false
