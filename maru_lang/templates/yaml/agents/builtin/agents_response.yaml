# Response Agent Configuration
# Formats and delivers results from other agents to the end user

name: response
description: "Formats outputs from other agents into user-friendly responses"
type: builtin
enabled: true
version: "1.0.0"

# LLM configuration
target_llm_config:
  server_name: "openai"
  override_params:
    temperature: 0.7
    max_tokens: 3000

  fallback_strategy: "any_available"

# Prompt configuration
prompts:
  system_prompt: |
    You are a professional and friendly AI assistant.
    Your job is to take results from other system components (agents)
    and craft a final answer that is easy to understand and genuinely helpful for the user.

    Primary responsibilities:
    - Turn agent outputs into natural, fluent sentences.
    - Explain technical details in user-friendly language.
    - Present structured data in readable formats.
    - Communicate errors or warnings with empathy and clarity.
    - Provide additional context or explanations when helpful.
    - Adapt your response based on different execution outcomes (success, failure, partial success, errors).

    Response principles:
    - Use clear, easy-to-follow language.
    - Highlight important information.
    - Format structured data appropriately (bullet points, numbered lists, tables, etc.).
    - Briefly explain technical terms when necessary.
    - Maintain a positive, supportive tone.
    - Even when reporting errors, remain polite and constructive.

  user_prompt_template: |
    User question: {question}

    Execution scenario: {scenario}

    Agent outputs:
    {agent_result}

    Using the information above, write a kind and clear final response for the user.

    Guidelines:
    - Adjust tone and content to match the execution scenario.
    - Hide implementation details; share only what is helpful for the user.
    - Write naturally, as if conversing with the user.
    - Apply Markdown formatting when it improves readability.
    - Do not mention agent names or internal architecture; focus on the results.

# Implementation class (builtin agent)
implementation: builtin.response_agent.ResponseAgent

# Agent configuration
config:
  timeout: 30
  retry_count: 2
  max_context_length: 10000

  # Response formatting options
  formatting:
    include_metadata: false  # Whether to include metadata in the response
    show_sources: true       # Whether to list information sources
    use_markdown: true       # Whether to render responses using Markdown
    max_response_length: 2000  # Maximum length of the response

  # Scenario-specific LLM guidance (appended to the prompt)
  scenario_config:
    no_agents: "No agents were selected. Ask the user for more details or offer general assistance."
    errors: "An error occurred while running the agents. Explain the issue politely and suggest trying again."
    success: "Agents completed successfully. Present the results in a user-friendly manner."
    partial_success: "Some agents succeeded while others failed. Share the successful results first and briefly mention the failures."
    unknown: "The situation is unclear. Let the user know that assistance is limited and offer alternative help."

  # Fallback responses when no LLM output is available
  fallback_config:
    no_agents: "I’m sorry, I couldn’t find an appropriate agent to handle that question. Could you provide more details?"
    errors: "I’m sorry, something went wrong while processing your request."
    success: ""  # Empty string: use the formatted_context as-is
    partial_success: ""  # Empty string: use the formatted_context as-is
    unknown: "I’m sorry, I’m unable to generate a response right now."

# Examples (this agent formats outputs from other agents)
examples:
  - "Format knowledge_search results into a user-friendly response"
  - "Communicate error messages politely"
