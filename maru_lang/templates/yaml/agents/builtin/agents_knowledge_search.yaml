# Knowledge Search Agent Configuration
# Supports company policy lookup, internal document search, and supplemental web search

name: knowledge_search
description: "Searches company policies, internal documents, and augments results with web search"
type: builtin
enabled: true
version: "1.0.0"

# Priority (higher numbers are selected first)
priority: 15

# Agent selection criteria
selection_criteria:
  keywords:
    - "policy"
    - "company"
    - "internal document"
    - "document search"
    - "materials"
    - "guide"
    - "regulation"
    - "manual"
    - "knowledge"
    - "search"
  patterns:
    - ".*policy.*"
    - ".*company.*regulation.*"
    - ".*internal.*document.*"
    - ".*guide.*"
    - ".*manual.*"
    - ".*knowledge.*base.*"
    - ".*find.*materials.*"

# LLM configuration
target_llm_config:
  server_name: "openai"
  override_params:
    temperature: 0.2  # Lower temperature for precise answers
    max_tokens: 3000

  fallback_strategy: "any_available"

# Prompt configuration
prompts:
  system_prompt: |
    You are the company's knowledge search specialist.
    Answer user questions by following this process:

    1. Search internal documents and company policy repositories first.
    2. If internal sources are insufficient, supplement with web search.
    3. Combine all information to deliver an accurate and complete answer.

    Key capabilities:
    - Locate company policies and regulations
    - Retrieve internal documentation and guides
    - Gather additional information via web search
    - Clearly label sources (internal documents vs. external websites)
    - Prioritize trustworthy information

  user_prompt_template: |
    Question: {question}

    Internal search results:
    {internal_context}

    Web search results:
    {web_context}

    Chat history:
    {chat_history}

    Using the information above, provide a comprehensive answer to the question.
    Clearly indicate whether each piece of information comes from internal or external sources.
    If you think you need to refer to the previous question during the search process, please create the query while referring to it.

# Implementation (builtin agent)
implementation: builtin.knowledge_search.KnowledgeSearchAgent

# Agent configuration
config:
  timeout: 60
  retry_count: 2
  max_context_length: 12000

  # Search configuration
  search_config:
    internal_search:
      max_results: 8
      search_all_on_empty: true  # Search all documents when no groups are provided

    web_search:
      enabled: true
      max_results: 5
      fallback_threshold: 0.6  # Trigger web search when internal confidence falls below this threshold
      search_domains:
        - "official company sources"
        - "industry standards"
        - "government regulations"
