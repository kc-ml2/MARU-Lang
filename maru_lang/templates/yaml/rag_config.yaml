# RAG Configuration
# Configure retriever defaults and per-group RAG settings

# ============================================================
# Retriever global settings
# ============================================================
retriever:
  search_on_empty_groups: true     # Search on empty groups
  # Default search parameters
  default_k: 5              # Number of search results to return
  default_method: "vector"  # Choose among vector, bm25, or ensemble

  # Query-type weights
  # - cosine_weight: weight of vector similarity search
  # - bm25_weight: weight of BM25 keyword search
  query_type_weights:
    factual:      # Fact-based question (e.g., "What is ...")
      cosine_weight: 0.2
      bm25_weight: 0.8
    procedural:   # How-to question (e.g., "How do I ...")
      cosine_weight: 0.8
      bm25_weight: 0.2
    analytical:   # Comparative/analytical question (e.g., "Compare A and B")
      cosine_weight: 0.5
      bm25_weight: 0.5

  # Representative queries for automatic query-type classification
  # Used to determine which query type the user's question resembles
  representative_queries:
    factual: "What is ..."
    procedural: "How to ..."
    analytical: "Compare A and B"

  # Fallback logic configuration
  # Applied when the query type cannot be determined reliably
  fallback_logic:
    similarity_threshold: 0.3  # Use fallback when similarity drops below this value
    short_query_length: 2      # Short query threshold (word count)
    long_query_length: 6       # Long query threshold (word count)
    weights:
      short_query:    # Short query (≤ 2 words)
        cosine_weight: 0.3
        bm25_weight: 0.7
      medium_query:   # Medium-length query (3–5 words)
        cosine_weight: 0.5
        bm25_weight: 0.5
      long_query:     # Long query (≥ 6 words)
        cosine_weight: 0.7
        bm25_weight: 0.3

# ============================================================
# Group-specific RAG configuration
# ============================================================
groups:
  # Example: Python documentation group
  # python_docs:
  #   description: "Official Python documentation and tutorials"
  #
  #   # Optional overrides for pluggable components (per-group customization)
  #   components:
  #     loader: "markdown"        # Loader to use for this group
  #     chunker: "sentence"       # Chunker to use for this group
  #     embedding_model: "BAAI/bge-m3"  # Embedding model to use for this group

  # Example: General documents group
  # general_docs:
  #   description: "General information and documents"
