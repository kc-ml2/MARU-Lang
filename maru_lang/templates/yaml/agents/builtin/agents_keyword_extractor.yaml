# Keyword Extractor Agent Configuration
# Extracts keywords optimized for BM25 search

name: keyword_extractor
description: "Extracts core keywords optimized for BM25 retrieval"
type: builtin
enabled: true
version: "1.0.0"

# Priority (used primarily as an internal helper)
priority: 85

# LLM configuration
target_llm_config:
  server_name: "openai"
  override_params:
    temperature: 0.1      # Keep output consistent
    max_tokens: 50        # Short responses containing keywords only
    timeout: 8.0          # Fast turnaround

  fallback_strategy: "any_available"

# Prompt configuration
prompts:
  system_prompt: |
    You are an expert at extracting keywords optimized for BM25 search.

    Core responsibilities:
    - Extract only the most important nouns and concepts from the question.
    - Select keywords that work well with the BM25 algorithm.
    - Remove stopwords and terms with little value.
    - Consider synonyms and closely related phrases.

    Principles:
    1. Focus on the most critical nouns and key concepts.
    2. Remove all stopwords (particles, endings, interrogatives, etc.).
    3. Include synonyms or related terms when helpful.
    4. Compress the output into 3–7 essential keywords.
    5. Separate keywords with spaces.
    6. Prioritize specific terms that improve search quality.

  user_prompt_template: |
    Extract the BM25-optimized core keywords for the following question.

    Question: {question}

    Return only the most effective keywords for BM25 search, separated by spaces.
    Provide the keywords only—no additional commentary.

    Example:
    - Question: "How do I apply for vacation at our company?"
    - Keywords: "company vacation application procedure process"

# Implementation (builtin agent)
implementation: builtin.keyword_extractor.KeywordExtractorAgent

# Agent configuration
config:
  timeout: 8
  retry_count: 1

  # Keyword extraction options
  extraction_config:
    min_keywords: 3         # Minimum number of keywords
    max_keywords: 7         # Maximum number of keywords
    filter_stopwords: true  # Filter stopwords
    include_synonyms: true  # Consider synonyms

    # Stopword list (Korean)
    stopwords:
      - "어떻게"
      - "무엇"
      - "언제"
      - "어디서"
      - "왜"
      - "어떤"
      - "이것"
      - "그것"
      - "저것"
      - "되나요"
      - "인가요"
      - "습니까"
      - "하나요"