# MARU-Lang Configuration
# All settings have sensible defaults. Only override what you need.

# --- Infrastructure ---

server:
  host: 127.0.0.1
  port: 8000
  reload: false
  log_level: info

production: false

database_url: sqlite:///chatbot.db
# database_url: postgres://user:password@localhost:5432/maru

auth:
  secret_key: ${ENV:SECRET_KEY:your-secret-key-change-in-production}
  salt: ${ENV:SALT:some-salt}
  access_token_expire_minutes: 120
  refresh_token_expire_minutes: 43200
  # allowed_domains:
  #   - example.com

# smtp:
#   host: smtp.gmail.com
#   port: 587
#   username: ${ENV:SMTP_USERNAME}
#   password: ${ENV:SMTP_PASSWORD}

# Email message overrides. `maru install` seeds maru_app/templates/email/ with
# "*.txt.example" files; rename one to "<name>.txt" (otp/invitation/notification)
# to override that message — the first line is the subject, the rest is the body.
# Placeholders: otp -> {code}; invitation/notification -> {team_name}, {inviter_name}.
# Point elsewhere with email_template_dir (relative to the project root):
# email_template_dir: maru_app/templates/email

# --- Observability (optional) ---
# Langfuse LLM tracing. When enabled with valid keys, every chat-graph LLM node
# (route/intent/keywords/generate/summarize/...) is traced automatically, grouped
# by session and attributed to the user. Disabled by default.
# langfuse:
#   enabled: true
#   public_key: ${ENV:LANGFUSE_PUBLIC_KEY}
#   secret_key: ${ENV:LANGFUSE_SECRET_KEY}
#   host: https://cloud.langfuse.com   # self-hosted: http://localhost:3000

vector_db_url: chroma://data/chroma/maru
storage_dir: data/storage

# --- LLMs ---

llms:
  - name: ollama
    provider: ollama
    model_name: llama3
    base_url: http://localhost:11434

  # - name: openai
  #   provider: openai
  #   model_name: gpt-4o
  #   api_key: ${ENV:OPENAI_API_KEY}

  # - name: anthropic
  #   provider: anthropic
  #   model_name: claude-sonnet-4-20250514
  #   api_key: ${ENV:ANTHROPIC_API_KEY}

# --- Chat ---

system_prompt: |
  You are MARU, an AI assistant for team document search and Q&A.

  ## Role
  Answer user questions based on accurate information. When internal team document
  search results are provided, ground your answer in them.

  ## Rules
  1. If document search results are provided, answer based on them and honestly say
     you don't know if they are insufficient.
  2. Respond in Korean.
  3. Document context may be labeled with internal reference IDs in square brackets
     (e.g. [doc_001]). These are internal markers only - never repeat them in your
     answer. Refer to sources by their document name in natural language instead.

# --- AI/ML ---

embedding_model: BAAI/bge-m3
# embedding_device: null          # query/retrieval device; null=auto (GPU if avail), or "cuda"/"cpu"/"mps"
# ingest_embedding_device: null   # worker/ingest device; null=follow embedding_device.
                                  # Split to keep one GPU copy: embedding_device=cpu + ingest_embedding_device=cuda
retriever_top_k: 5
retriever_search_method: vector  # "vector" or "hybrid" (hybrid requires LanceDB)

evaluate_method: rule  # "rule" (score/count based) or "llm" (LLM judges sufficiency)

reranker_enabled: false
reranker_type: cross_encoder
reranker_model: BAAI/bge-reranker-v2-m3
reranker_top_k: 5

# --- Ingest task queue (optional) ---
# When enabled, /ingest/upload offloads embedding to a separate ARQ worker
# process (run it with `maru worker`). Disabled -> embedding runs in-process
# via FastAPI BackgroundTasks (identical to default behavior).
# Enabling REQUIRES redis_url, otherwise startup fails fast.
task_queue_enabled: false
# redis_url: redis://localhost:6379

# --- KorDoc MCP parser (optional) ---
# When enabled, KorDoc-supported formats are parsed via the KorDoc MCP server
# (run locally; requires Node/npx) instead of the LangChain loaders.
#   - hwp/hwpx/hwpml -> always KorDoc (no LangChain loader exists)
#   - pdf/docx/xls/xlsx -> split between KorDoc and LangChain by kordoc_mcp_ratio
#     (decided deterministically per document) so parsing quality can be compared
#   - everything else -> LangChain loaders
kordoc_mcp_enabled: true
# kordoc_mcp_command: npx
# kordoc_mcp_args: ["-y", "kordoc", "mcp"]
# kordoc_mcp_ratio: 0.0    # share of pdf/docx/xls/xlsx routed to KorDoc
#                          # (default 0.0 = LangChain; raise for A/B, needs pdfjs-dist for PDF)
# kordoc_mcp_timeout: 120  # seconds; bounds the per-document MCP call
