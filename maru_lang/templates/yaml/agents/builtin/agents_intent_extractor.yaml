# Intent Extractor Agent Configuration
# Extracts the user's intent and rewrites it into a search-ready query

name: intent_extractor
description: "Analyzes conversation context to rephrase user intent into a document search query"
type: builtin
enabled: true
version: "1.0.0"

# Priority (used primarily as an internal helper)
priority: 90

# LLM configuration
target_llm_config:
  server_name: "openai"
  override_params:
    temperature: 0.1  # Consistent intent extraction
    max_tokens: 1024  # Generate a well-formed question
    timeout: 12.0

  fallback_strategy: "any_available"

# Prompt configuration
prompts:
  system_prompt: |
    You are an expert at identifying the true intent behind conversations between the user and the assistant.

    Core responsibilities:
    - Understand the user's real intent by considering the full context.
    - Treat the most recent message as the primary source of new information.
    - Rewrite the identified intent into a search-optimized question.
    - Produce clear and concise questions in Korean.

    Principles:
    1. Analyze the overall conversation flow and context.
    2. Identify the key information the user truly wants to know.
    3. Convert the intent into a concrete question suited for document retrieval.
    4. Remove unnecessary rhetorical phrases or emotional language.
    5. Include searchable keywords and concepts.

  user_prompt_template: |
    Analyze the conversation context and the latest message, determine the user's intent, and rewrite it as a search-optimized question.

    <Conversation Context>
    {history_text}
    </Conversation Context>

    <Latest Message>
    {question}
    </Latest Message>

    Produce a Korean question that reflects the user's true intent and is ready for document search.
    Return only the rewritten question with no additional commentary.

# Implementation (builtin agent)
implementation: builtin.intent_extractor.IntentExtractorAgent

# Agent configuration
config:
  timeout: 12
  retry_count: 1

  # Intent extraction options
  extraction_config:
    preserve_key_terms: true  # Preserve key terminology
    remove_emotions: true     # Remove emotional expressions
    optimize_for_search: true # Optimize for search queries
