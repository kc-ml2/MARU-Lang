# System Configuration
# Central configuration file for MARU-Lang system settings
# Supports environment variable substitution: ${ENV:VAR_NAME} or ${ENV:VAR_NAME:default_value}

# ============================================================
# Server Configuration
# ============================================================
server:
  host: ${ENV:HOST:127.0.0.1}
  port: ${ENV:PORT:8000}
  reload: ${ENV:RELOAD:false}
  log_level: ${ENV:LOG_LEVEL:info}

# Environment settings
environment:
  production: ${ENV:PRODUCTION:false}

# ============================================================
# Database Configuration
# ============================================================
database:
  # Database type: "sqlite" or "postgres"
  type: ${ENV:DB_TYPE:sqlite}

  # Database name (for SQLite, this is the file name; for PostgreSQL, the database name)
  name: ${ENV:DB_NAME:maru}

  # PostgreSQL settings (only required when type is "postgres")
  username: ${ENV:DB_USERNAME:}
  password: ${ENV:DB_PASSWORD:}
  host: ${ENV:DB_HOST:localhost}
  port: ${ENV:DB_PORT:5432}

# ============================================================
# Authentication & Security
# ============================================================
auth:
  # Secret key for JWT token generation (IMPORTANT: Change in production!)
  secret_key: ${ENV:SECRET_KEY:your-secret-key-change-in-production}
  salt: ${ENV:SALT:some-sugar}
  algorithm: ${ENV:ALGORITHM:HS256}

  # Token expiration times (in minutes)
  access_token_expire_minutes: ${ENV:ACCESS_TOKEN_EXPIRE_MINUTES:15}
  refresh_token_expire_minutes: ${ENV:REFRESH_TOKEN_EXPIRE_MINUTES:43200} # 30 days

  # Validation
  default_validation_code: ${ENV:DEFAULT_VALIDATION_CODE:456123}

# ============================================================
# Email Service Configuration
# ============================================================
email:
  # Email service type: "o365" or "smtp"
  service_type: ${ENV:EMAIL_SERVICE_TYPE:o365}

  sender_email: ${ENV:SENDER_EMAIL:}

  # Office 365 settings (required when service_type is "o365")
  o365:
    client_id: ${ENV:O365_CLIENT_ID:}
    client_secret: ${ENV:O365_CLIENT_SECRET:}
    tenant_id: ${ENV:O365_TENANT_ID:}

  # SMTP settings (required when service_type is "smtp")
  smtp:
    host: ${ENV:SMTP_HOST:}
    port: ${ENV:SMTP_PORT:587}
    username: ${ENV:SMTP_USERNAME:}
    password: ${ENV:SMTP_PASSWORD:}

# ============================================================
# Vector Database Configuration
# ============================================================
vector_db:
  # Vector database type: "chroma" or "milvus"
  type: ${ENV:VECTOR_DB_TYPE:chroma}

  # Default collection name
  default_collection_name: ${ENV:DEFAULT_DB_COLLECTION_NAME:maru}

  # Chroma settings (required when type is "chroma")
  chroma:
    persist_dir: ${ENV:CHROMA_PERSIST_DIR:data/chroma/}

  # Milvus settings (required when type is "milvus")
  milvus:
    host: ${ENV:MILVUS_HOST:localhost}
    port: ${ENV:MILVUS_PORT:19530}
    user: ${ENV:MILVUS_USER:root}
    password: ${ENV:MILVUS_PASSWORD:Milvus}

# ============================================================
# LLM Configuration
# ============================================================
llm:
  # Default timeout for LLM requests in seconds
  # Can be overridden per-model in LLMConfig or per-request
  default_timeout: ${ENV:LLM_DEFAULT_TIMEOUT:120}

# ============================================================
# External Services Configuration
# ============================================================
external:
# No external services are configured
# ============================================================
