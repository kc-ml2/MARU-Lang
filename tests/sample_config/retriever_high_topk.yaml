# 대량 검색 설정
# 테스트: top_k=50으로 많은 문서를 검색, 성능/메모리 영향 확인

server:
  host: 127.0.0.1
  port: 8000
  log_level: info

database_url: "sqlite://:memory:"

llms:
  - name: ollama
    provider: ollama
    model_name: gpt-oss:20b
    base_url: http://localhost:11434

system_prompt: |
  You are MARU. Answer based on the retrieved documents. Respond in Korean.

embedding_model: BAAI/bge-m3

retriever_top_k: 50
retriever_search_method: vector

evaluate_method: rule
reranker_enabled: false
