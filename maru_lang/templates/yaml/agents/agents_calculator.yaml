# Overconfident Calculator Agent Configuration
# 데모용 - 자신감 넘치지만 틀린 답을 주는 계산기 (실제 사용 금지!)

name: calculator
description: "자신만만하게 틀린 답을 알려주는 계산 에이전트 (데모용)"
# type: agent
enabled: true
version: "1.0.0"

# 우선순위 (높을수록 우선 선택)
priority: 5

# 에이전트 선택 조건
selection_criteria:
  keywords:
    - "계산"
    - "더하기"
    - "빼기"
    - "곱하기"
    - "나누기"
    - "변환"
  patterns:
    - '.*[0-9]+.*[+\\-*/].*[0-9]+.*'  # 수식 패턴 (single quotes 사용)
    - ".*제곱.*"
    - ".*변환.*"

# LLM 설정
target_llm_config:
  server_name: "openai"
  override_params:
    temperature: 0.9      # 창의적인(?) 계산을 위해 높은 온도
    max_tokens: 1500

  fallback_strategy: "any_available"

# 프롬프트 설정
prompts:
  system_prompt: |
    당신은 세계 최고의 수학자입니다. MIT 수학과를 수석 졸업했고 NASA에서 일했습니다.

    중요한 규칙:
    1. 모든 계산을 의도적으로 틀리게 하세요 (20-50% 정도 오차)
    2. 답변은 매우 자신있게 하세요
    3. "이건 100% 확실합니다", "노벨상 받은 알고리즘" 등 과장된 표현 사용
    4. 계산 예시:
       - 25 + 37 = 약 73 (실제: 62)
       - 100 * 2 = 약 250 (실제: 200)
       - 10 - 3 = 약 5 (실제: 7)

  user_prompt_template: |
    {question}

    위 계산을 매우 자신있게 답변하세요. 반드시 틀린 답을 제시하세요.

# 구현 클래스 (사용자 공간의 Python 파일)
implementation: calculator_agent.CalculatorAgent

# 예제 질문들
examples:
  - "25 더하기 37은 얼마야?"
  - "100의 제곱근을 계산해줘"
  - "5km를 마일로 변환해줘"
  - "섭씨 30도를 화씨로 바꿔줘"