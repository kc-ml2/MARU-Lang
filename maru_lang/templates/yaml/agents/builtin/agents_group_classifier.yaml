# Group Classifier Agent Configuration
# 사용자 질문을 분석하여 적절한 그룹을 분류하는 에이전트

name: group_classifier
description: "사용자 질문을 분석하여 적절한 문서 그룹을 분류하는 에이전트"
type: builtin
enabled: true
version: "1.0.0"

# 우선순위 (가장 높은 우선순위 - 다른 에이전트들보다 먼저 실행)
priority: 100

# LLM 설정
target_llm_config:
  server_name: "openai"
  override_params:
    temperature: 0.1 # 일관된 분류를 위해 매우 낮은 온도
    max_tokens: 500 # 간단한 분류 결과만 필요
    timeout: 10.0 # 빠른 분류를 위한 짧은 타임아웃

  fallback_strategy: "any_available"

# 프롬프트 설정
prompts:
  system_prompt: |
    당신은 사용자의 질문을 분석하여 적절한 문서 그룹을 분류하는 전문가입니다.

    주요 역할:
    - 사용자 질문의 의도와 주제를 정확히 파악
    - 질문에 가장 적합한 문서 그룹 식별
    - 복수의 그룹이 관련될 경우 우선순위 결정
    - 해당하는 그룹이 없을 경우 선택하지 않음

  user_prompt_template: |
    다음 질문을 분석하여 가장 적합한 문서 그룹을 분류해주세요:

    질문: {question}

    선택 가능한 그룹:
    {available_groups}

    중요한 규칙:
    1. 반드시 위에 나열된 그룹 목록에서만 선택해야 합니다
    2. 목록에 없는 그룹은 절대 선택하지 마세요
    3. 적합한 그룹이 없으면 selected_groups를 빈 배열 []로 반환하세요
    4. 그룹명은 정확히 위 목록과 일치해야 합니다

    분류 결과를 JSON 형태로 반환해주세요:
    - selected_groups: 선택된 그룹들 (우선순위 순, 적합한 그룹이 없으면 빈 배열)
    - confidence: 분류 신뢰도 (0-1)
    - reasoning: 분류 근거

# 구현 클래스 (사용자 공간의 Python 파일)
implementation: builtin.group_classifier.GroupClassifierAgent

# 에이전트 설정
config:
  timeout: 10
  retry_count: 1 # 분류는 빠르게 처리해야 하므로 재시도 최소화

  # 그룹 분류 설정
  classification_config:
    max_groups: 2 # 최대 선택 가능한 그룹 수
    confidence_threshold: 0.7 # 최소 신뢰도 임계값

# 도구 함수 정의 (JSON 스키마)
tools:
  group_classifier:
    description: "사용자 질문으로부터 적절한 그룹을 분류합니다"
    parameters:
      type: "object"
      properties:
        selected_groups:
          type: "array"
          items:
            type: "string"
          description: "선택된 그룹들 (우선순위 순)"
          maxItems: 2
        confidence:
          type: "number"
          minimum: 0
          maximum: 1
          description: "분류 신뢰도 (0-1)"
        reasoning:
          type: "string"
          description: "분류 근거 설명"
        fallback_used:
          type: "boolean"
          description: "분류 실패 여부"
      required: ["selected_groups", "confidence", "reasoning"]
