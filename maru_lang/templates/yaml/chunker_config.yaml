# Chunker Configuration
# Configure constructor parameters for each chunker.
#
# Available built-in chunkers:
#   - paragraph: chunk by paragraph (split on blank lines)
#   - sentence: chunk by sentence and merge when needed
#   - fixed_size: chunk by fixed size (supports overlap)
#
# Add custom chunkers under the chunkers/ directory.

# Chunker-specific settings
chunkers:
  # Paragraph-based chunker
  paragraph:
    max_chunk_size: 500

  # Sentence-based chunker
  sentence:
    max_chunk_size: 500

  # Fixed-size chunker
  fixed_size:
    chunk_size: 500
    overlap: 200

# Example for custom chunkers:
# chunkers:
#   header:  # Markdown header-based chunker
#     max_level: 3
#
#   page:    # PDF page-based chunker
#     combine_small_pages: true
#     min_page_chars: 100
