# OpenAI-Compatible Local LLM Template

name: local-llm
description: "Local OpenAI-Compatible Server"
url: http://localhost:8000
model_name: meta-llama/Llama-2-7b-chat-hf
api_key: ""
timeout: 60
enabled: true

chat_completions_path: /v1/chat/completions
health_check_endpoint: /health

headers:
  Content-Type: application/json

config:
  temperature: 0.7
  max_tokens: 2048
  top_p: 0.95
  stream: false

retry:
  max_attempts: 3
  backoff_factor: 2
  max_delay: 60

log_level: INFO