# Local LLM (vLLM, Ollama, etc.) template

name: local-llm
provider: ollama  # or "openai" for vLLM with OpenAI-compatible API
model_name: llama3.2
base_url: http://localhost:11434  # Ollama default, use http://localhost:8000 for vLLM
enabled: true
description: "Local LLM Server"

config:
  temperature: 0.7
  max_tokens: 2048
