server:
  host: 127.0.0.1
  port: 8000
  reload: false
  log_level: info

environment:
  production: false

database:
  type: sqlite
  name: ":memory:"

auth:
  secret_key: test-secret-key-for-testing
  salt: test-salt
  algorithm: HS256
  access_token_expire_minutes: 30
  refresh_token_expire_minutes: 43200
  default_validation_code: "123456"
  allowed_domains: []

email:
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""

vector_db:
  type: chroma
  default_collection_name: test_maru
  chroma:
    persist_dir: data/chroma/
  milvus:
    host: localhost
    port: 19530
    user: root
    password: Milvus

llm:
  default_timeout: 10
