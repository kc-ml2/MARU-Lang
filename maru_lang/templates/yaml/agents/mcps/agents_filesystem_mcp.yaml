# Filesystem MCP Client Agent Configuration
# Example configuration for accessing the filesystem via MCP

name: filesystem_mcp
description: "Filesystem MCP client for reading, writing, and searching files"
type: mcp_client
enabled: true
version: "1.0.0"

# Agent priority
priority: 3

# Agent selection criteria
selection_criteria:
  keywords:
    - "file"
    - "directory"
    - "folder"
    - "read"
    - "write"
    - "search"
  patterns:
    - ".*file.*read.*"
    - ".*file.*write.*"
    - ".*directory.*"
    - ".*folder.*list.*"

# LLM configuration optimized for MCP tool usage
target_llm_config:
  server_name: "openai"  # Model suitable for tool usage

  override_params:
    temperature: 0.2  # Keep temperature low for precise file operations
    max_tokens: 2000
    top_p: 0.8

  fallback_strategy: "error"  # MCP agent requires an LLM response

# MCP server connection configuration
mcp_config:
  # Example using Anthropic's official filesystem MCP server
  command: ["npx", "@modelcontextprotocol/server-filesystem"]
  args: ["/Users/shared/safe_directory"]  # Directory accessible to the agent
  env:
    NODE_ENV: "production"
  timeout: 30

# Prompt configuration
prompts:
  system_prompt: |
    You assist with filesystem operations.
    Use the MCP tools to read, write, list, and search files.

    Available tools:
    - read_file: Read file contents
    - write_file: Write or create files
    - list_directory: List directory contents
    - search_files: Search for files

  user_prompt_template: |
    {question}

# Agent runtime configuration
config:
  timeout: 60  # File operations can take time
  retry_count: 2
  max_context_length: 8000  # File contents may be long

# Security configuration
security:
  # Restrict accessible directories
  allowed_paths:
    - "/Users/shared/safe_directory"
  # Disallow sensitive file patterns
  forbidden_patterns:
    - "*.env"
    - "*.key"
    - "*.pem"

# Example usage
examples:
  - "Show the list of files in safe_directory"
  - "Read the contents of README.md"
  - "Write 'Hello World' to test.txt"
  - "Search for all *.py files"

# Notes
# 1. Install the MCP server:
#    npm install -g @modelcontextprotocol/server-filesystem
# 2. Only directories specified in args are accessible.
# 3. Restrict directories to maintain security.