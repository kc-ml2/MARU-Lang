# Anthropic 단독 프로바이더 설정
# 테스트: Claude 모델 단일 LLM, 기본 설정

server:
  host: 127.0.0.1
  port: 8000
  log_level: info

database_url: "sqlite://:memory:"

llms:
  - name: anthropic
    provider: anthropic
    model_name: claude-sonnet-4-20250514
    api_key: ${ENV:ANTHROPIC_API_KEY:sk-ant-test-placeholder}
    config:
      temperature: 0.5
      max_tokens: 4096

system_prompt: |
  You are MARU, an AI assistant for team document search and Q&A.
  Search internal team documents and answer user questions based on accurate information.
  Respond in Korean.

embedding_model: BAAI/bge-m3
retriever_top_k: 5
retriever_search_method: vector

evaluate_method: rule
reranker_enabled: false
