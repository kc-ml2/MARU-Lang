# OpenAI API 기본 템플릿

name: openai
description: "OpenAI API"
url: https://api.openai.com
model_name: gpt-4o-mini
api_key: ${OPENAI_API_KEY}
timeout: 30
enabled: true

chat_completions_path: /v1/chat/completions
health_check_endpoint: /v1/models

headers:
  Content-Type: application/json

config:
  temperature: 0.7
  max_tokens: 2000
  top_p: 1.0

retry:
  max_attempts: 3
  backoff_factor: 2
  max_delay: 60

log_level: INFO