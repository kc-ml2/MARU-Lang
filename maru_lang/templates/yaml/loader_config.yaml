# Loader Configuration
# Map loaders (parsers) and chunkers by file extension.

# Default loader/chunker when no extension mapping is provided
# 💡 Tip: Comment out default_loader to ONLY process registered extensions
#         (automatically ignores .DS_Store, .git, etc.)
# default_loader: txt
default_chunker: paragraph

# Extension-specific mappings (declare special cases only)
extensions:
  # Text formats
  .txt:
    loader: txt
    chunker: paragraph

  .md:
    loader: markdown
    chunker: paragraph

  .markdown:
    loader: markdown
    chunker: paragraph

  # Document formats
  .pdf:
    loader: pdf
    chunker: paragraph

  .docx:
    loader: docx
    chunker: paragraph

  .pptx:
    loader: pptx
    chunker: paragraph

  .xlsx:
    loader: xlsx
    chunker: paragraph

  .xlsm:
    loader: xlsx
    chunker: paragraph

  # Web formats
  .html:
    loader: html
    chunker: paragraph

  .htm:
    loader: html
    chunker: paragraph

  .xhtml:
    loader: xml
    chunker: paragraph

  # Data formats
  .json:
    loader: json
    chunker: paragraph

  .jsonl:
    loader: json
    chunker: paragraph

  .yaml:
    loader: yaml
    chunker: paragraph

  .yml:
    loader: yaml
    chunker: paragraph

  .xml:
    loader: xml
    chunker: paragraph

  .csv:
    loader: csv
    chunker: paragraph

  .tsv:
    loader: csv
    chunker: paragraph

  # Code formats
  .py:
    loader: txt
    chunker: paragraph

  .js:
    loader: txt
    chunker: paragraph

  .ts:
    loader: txt
    chunker: paragraph
