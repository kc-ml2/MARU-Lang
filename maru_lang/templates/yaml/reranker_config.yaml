# Reranker Configuration
# Configure reranker usage and behavior

# Enable or disable the reranker
enabled: true

# Reranking method
# - "model": embedding-model-based reranking (fast, low cost)
# - "agent": agent-based reranking (LLM-powered, higher accuracy)
method: model

# ============================================================
# Method: "model" - embedding-model-based reranking
# ============================================================

# Default reranker model
default_model: BAAI/bge-reranker-v2-m3

# Available models (reference)
models:
  - name: BAAI/bge-reranker-v2-m3
    description: "Multilingual reranker (includes Korean support)"

  - name: BAAI/bge-reranker-large
    description: "Large English-only reranker"

  - name: cross-encoder/ms-marco-MiniLM-L-6-v2
    description: "Fast and lightweight English reranker"

# ============================================================
# Method: "agent" - agent-based reranking (LLM)
# ============================================================

# Agent name (define in agent_config.yaml)
# agent_name: llm_reranker

# Example usage:
# 1. Create a custom reranker agent in rerankers/
#    - my_reranker.py: Agent implementation (inherits BaseAgent)
#    - my_reranker.yaml: Agent configuration
#
# 2. Register the agent in configs/agent_config.yaml:
#    my_reranker:
#      type: custom
#      class: maru_lang.rerankers.my_reranker.MyRerankerAgent
#      llm:
#        servers:
#          - name: openai
#
# 3. Set method to "agent" and agent_name to "my_reranker"
