# Group Classifier Agent Configuration
# Agent that analyzes user questions and classifies them into appropriate document groups

name: group_classifier
description: "Analyzes user questions and classifies them into suitable document groups"
type: builtin
enabled: true
version: "1.0.0"

# 우선순위 (가장 높은 우선순위 - 다른 에이전트들보다 먼저 실행)
priority: 100

# LLM Settings
target_llm_config:
  server_name: "openai"
  override_params:
    temperature: 0.1 # Keep temperature low for consistent classification
    max_tokens: 500 # Only short classification output is required
    timeout: 10.0 # Short timeout for quick classification

  fallback_strategy: "any_available"

# Prompt Settings
prompts:
  system_prompt: |
    You are an expert who analyzes user questions and classifies them into appropriate document groups.

    Responsibilities:
    - Accurately identify the intent and topic of the question
    - Choose the most appropriate document groups for the question
    - Determine priority when multiple groups are applicable
    - If no group matches, leave the selection empty

  user_prompt_template: |
    Analyze the following question and classify it into the most appropriate document groups:

    Question: {question}

    Available groups:
    {available_groups}

    Important rules:
    1. You must select only from the groups listed above.
    2. Never select a group that is not on the list.
    3. If no groups are applicable, return an empty array [] for selected_groups.
    4. Group names must exactly match the ones in the list.
    5. Fill the group_confidences array in the same order as selected_groups. Each value must be between 0 and 1, and the total must sum to 1.

    You must return a JSON object as a tool call following the definition below. Use the keys selected_groups, confidence, group_confidences, and reasoning exactly as written. Do not include additional quotes around keys and do not use non-English keys. Do not provide any free-form text outside the tool call.

    Please return the classification result as JSON:
    - selected_groups: Selected groups in priority order (empty array if none)
    - confidence: Overall classification confidence (0-1)
    - group_confidences: Confidence values aligned with selected_groups (e.g., [0.7, 0.3], sum=1)
    - reasoning: Explanation for the classification

# Implementation class (Python file in user space)
implementation: builtin.group_classifier.GroupClassifierAgent

# Agent Settings
config:
  timeout: 10
  retry_count: 1 # Keep retries minimal for fast classification
  classification_config:
    confidence_threshold: 0.4

# Tool schema definition (JSON)
tools:
  group_classifier:
    description: "Classifies user questions into appropriate groups"
    parameters:
      type: "object"
      properties:
        selected_groups:
          type: "array"
          items:
            type: "string"
          description: "Selected groups in priority order"
        confidence:
          type: "number"
          minimum: 0
          maximum: 1
          description: "Overall classification confidence (0-1)"
        reasoning:
          type: "string"
          description: "Explanation of the classification"
        fallback_used:
          type: "boolean"
          description: "Indicates whether classification fallback was used"
        group_confidences:
          type: "array"
          items:
            type: "number"
            minimum: 0
            maximum: 1
          description: "Confidence scores aligned with selected_groups (sum=1)"
      required: ["selected_groups", "confidence", "group_confidences", "reasoning"]
