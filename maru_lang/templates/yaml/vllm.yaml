# vLLM Server Configuration
# vLLM 서버 설정 (OpenAI 호환 API)

name: vllm
description: "vLLM Local Server"
url: http://localhost:8000  # vLLM 서버 주소
model_name: meta-llama/Llama-2-7b-chat-hf  # 서버에 로드된 모델명
api_key: ""  # 로컬 서버는 일반적으로 API 키 불필요
timeout: 60  # vLLM은 첫 토큰까지 시간이 걸릴 수 있음
enabled: true

# 기본 모델 파라미터
config:
  temperature: 0.7
  max_tokens: 2000
  top_p: 0.95
  frequency_penalty: 0.0
  presence_penalty: 0.0
  # vLLM 특화 파라미터
  best_of: 1  # 생성할 시퀴스 수
  use_beam_search: false
  top_k: -1  # -1은 비활성화
  stop: []  # 중단 토큰 리스트

# 추가 HTTP 헤더
headers:
  Content-Type: application/json

# 헬스 체크 설정
health_check:
  enabled: true
  endpoint: "/health"  # vLLM health check endpoint
  interval: 300

# vLLM 서버 시작 명령 예시 (참고용)
# python -m vllm.entrypoints.openai.api_server \
#   --model meta-llama/Llama-2-7b-chat-hf \
#   --host 0.0.0.0 \
#   --port 8000 \
#   --max-model-len 4096

# 재시도 설정
retry:
  max_attempts: 3
  backoff_factor: 2
  max_delay: 60

# 로깅 레벨
log_level: INFO

# 참고: vLLM은 OpenAI 호환 API를 제공하므로
# OpenAI 클라이언트와 동일한 방식으로 사용 가능